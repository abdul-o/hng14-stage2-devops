services:
  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - app-network

  api:
    build: ./api
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512m

  worker:
    build: ./worker
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256m

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started
    environment:
      - API_URL=${API_URL}
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 256m

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_started
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 128m

networks:
  app-network:
    driver: bridge